<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uitjesbazen Kantinescherm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    #app {
      background: linear-gradient(160deg, #B52890 0%, #A62482 60%, #8a1d6b 100%);
      min-height: 100vh; color: white;
      display: flex; flex-direction: column;
      font-family: 'Ubuntu', sans-serif;
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px; background: rgba(0,0,0,0.25);
      border-bottom: 3px solid #F7A940; flex-shrink: 0;
    }
    .logo-area { display: flex; align-items: center; gap: 14px; }
    .logo-img { height: 48px; width: auto; object-fit: contain; }
    .logo-fallback { display: flex; align-items: center; gap: 8px; }
    .wordmark { font-size: 24px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
    .header-center { text-align: center; }
    .header-dayname { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.5); }
    .header-fulldate { font-size: 20px; font-weight: 700; }
    .header-right { text-align: right; }
    .header-time { font-size: 42px; font-weight: 700; color: #F7A940; font-variant-numeric: tabular-nums; line-height: 1; }
    .header-week { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 1px; margin-top: 2px; }

    .main { flex: 1; display: grid; grid-template-columns: 1fr 260px; min-height: 0; }

    .trips-col { padding: 20px 24px; display: flex; flex-direction: column; overflow-y: auto; }
    .trips-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 14px; }
    .trips-list { display: flex; flex-direction: column; gap: 8px; }

    .trip-row {
      display: flex; align-items: stretch;
      background: rgba(255,255,255,0.08); border-radius: 10px;
      overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
    }
    .guide-block {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 5px; padding: 12px 14px; min-width: 84px;
      background: rgba(0,0,0,0.15); border-right: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .guide-photo {
      width: 44px; height: 44px; border-radius: 50%;
      border: 2px solid rgba(247,169,64,0.5);
      background: rgba(247,169,64,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: #F7A940;
      overflow: hidden; flex-shrink: 0;
    }
    .guide-photo img { width: 100%; height: 100%; object-fit: cover; }
    .guide-name { font-size: 10px; color: rgba(255,255,255,0.65); text-align: center; line-height: 1.3; max-width: 70px; }

    .trip-details { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .trip-activity-name { font-size: 17px; font-weight: 700; color: white; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .trip-info-line { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 2px; }
    .trip-info-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: rgba(255,255,255,0.55); }
    .trip-info-item i { font-size: 13px; }

    .busje-block {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 12px 16px; background: #F7A940; min-width: 90px; gap: 3px; flex-shrink: 0;
    }
    .busje-block.no-bus { background: rgba(0,0,0,0.12); }
    .busje-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(100,50,0,0.65); }
    .busje-num { font-size: 14px; font-weight: 700; color: #5a2d00; line-height: 1.2; text-align: center; max-width: 90px; word-break: break-word; }
    .busje-time { font-size: 13px; font-weight: 700; color: rgba(90,45,0,0.75); margin-top: 1px; }
    .no-bus-time { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.35); }

    .no-trips { padding: 48px 20px; text-align: center; color: rgba(255,255,255,0.25); font-size: 15px; }

    .sidebar { background: rgba(0,0,0,0.2); border-left: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; padding: 20px 18px; gap: 18px; overflow-y: auto; }
    .sidebar-block { display: flex; flex-direction: column; gap: 8px; }
    .sidebar-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.35); border-bottom: 1px solid rgba(255,255,255,0.07); padding-bottom: 5px; }

    .stat-item { display: flex; justify-content: space-between; align-items: baseline; }
    .stat-label { font-size: 13px; color: rgba(255,255,255,0.6); }
    .stat-value { font-size: 28px; font-weight: 700; color: #F7A940; line-height: 1; }

    .week-rows { display: flex; flex-direction: column; gap: 3px; }
    .week-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 7px; border-radius: 5px; font-size: 12px; }
    .week-row.today { background: rgba(247,169,64,0.15); border: 1px solid rgba(247,169,64,0.25); }
    .week-row-day { color: rgba(255,255,255,0.5); min-width: 44px; }
    .week-row-count { font-weight: 700; color: #F7A940; }
    .week-row-count.none { color: rgba(255,255,255,0.18); font-weight: 400; }

    .weather-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 4px; }
    .weather-cell { background: rgba(255,255,255,0.06); border-radius: 6px; padding: 6px 2px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .weather-cell.today { background: rgba(247,169,64,0.18); border: 1px solid rgba(247,169,64,0.3); }
    .wc-day { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; }
    .wc-icon { font-size: 17px; line-height: 1.2; }
    .wc-temp { font-size: 13px; font-weight: 700; }
    .wc-rain { font-size: 9px; color: rgba(255,255,255,0.35); }

    .sales-placeholder { background: rgba(247,169,64,0.07); border: 1px dashed rgba(247,169,64,0.2); border-radius: 8px; padding: 10px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.3); line-height: 1.6; }

    .footer { background: rgba(0,0,0,0.3); padding: 6px 32px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: rgba(255,255,255,0.25); flex-shrink: 0; }
    .live-dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; display: inline-block; margin-right: 5px; }
    .err-dot { background: #f87171; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo-area">
      <img src="logo.png" class="logo-img" onerror="this.style.display='none';document.getElementById('lf').style.display='flex';" alt="logo">
      <div class="logo-fallback" id="lf" style="display:none;">
        <span style="font-size:28px;">👑</span>
        <span class="wordmark">Uitjesbazen</span>
      </div>
    </div>
    <div class="header-center">
      <div class="header-dayname" id="h-dn"></div>
      <div class="header-fulldate" id="h-fd"></div>
    </div>
    <div class="header-right">
      <div class="header-time" id="h-t">--:--</div>
      <div class="header-week" id="h-w">WEEK -</div>
    </div>
  </div>

  <div class="main">
    <div class="trips-col">
      <div class="trips-title" id="trips-title">Uitjes vandaag</div>
      <div class="trips-list" id="trips-list"><div class="no-trips">Laden...</div></div>
    </div>
    <div class="sidebar">
      <div class="sidebar-block">
        <div class="sidebar-title">Vandaag</div>
        <div class="stat-item"><span class="stat-label">Uitjes</span><span class="stat-value" id="s-today">-</span></div>
        <div class="stat-item"><span class="stat-label">Personen</span><span class="stat-value" id="s-persons">-</span></div>
      </div>
      <div class="sidebar-block">
        <div class="sidebar-title">Deze week</div>
        <div class="week-rows" id="week-rows"></div>
      </div>
      <div class="sidebar-block">
        <div class="sidebar-title">Weer</div>
        <div class="weather-grid" id="weather-grid"><div style="grid-column:1/-1;text-align:center;color:rgba(255,255,255,0.2);font-size:11px;">laden...</div></div>
      </div>
      <div class="sidebar-block">
        <div class="sidebar-title">Sales deze week</div>
        <div class="sales-placeholder">Koppeling met HubSpot<br>volgt in volgende stap</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span><span class="live-dot" id="status-dot"></span><span id="status-txt">Verbinden...</span></span>
    <span id="f-refresh">-</span>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxyk6fibHfjLU3moMj8vEsmhqPLXPnetC5N541TMV4mDkX0mihmuiSMmkkvbKJlPJdolg/exec';
const DAYS_NL = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
const MONTHS_NL = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const SHORT_DAYS = ['zo','ma','di','wo','do','vr','za'];
let allRows = [];

function getWeekNum(d) {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() + 3 - (dt.getDay()+6)%7);
  const w1 = new Date(dt.getFullYear(),0,4);
  return 1 + Math.round(((dt-w1)/86400000 - 3 + (w1.getDay()+6)%7)/7);
}
function getMon(d) {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() + (dt.getDay()===0 ? -6 : 1-dt.getDay()));
  return dt;
}
function sameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function initials(n) {
  const p=(n||'').trim().split(/\s+/);
  return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():(n||'?').substring(0,2).toUpperCase();
}

function updateClock() {
  const now = new Date();
  document.getElementById('h-t').textContent = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  document.getElementById('h-dn').textContent = DAYS_NL[now.getDay()].toUpperCase();
  document.getElementById('h-fd').textContent = now.getDate()+' '+MONTHS_NL[now.getMonth()]+' '+now.getFullYear();
  document.getElementById('h-w').textContent = 'WEEK '+getWeekNum(now);
}

async function fetchData() {
  const r = await fetch(SCRIPT_URL);
  const d = await r.json();
  return d.uitjes || [];
}

function parseRows(uitjes) {
  return uitjes.map(u => {
    const d = new Date(u.datum);
    return { ...u, dateObj: isNaN(d) ? null : d };
  }).filter(r => r.dateObj && r.activiteit && r.spelleider);
}

function renderTrips() {
  const now = new Date();
  const today = allRows.filter(r => sameDay(r.dateObj, now)).sort((a,b)=>(a.tijd||'').localeCompare(b.tijd||''));

  document.getElementById('s-today').textContent = today.length;
  document.getElementById('s-persons').textContent = today.reduce((s,r)=>s+(parseInt(r.personen)||0),0) || '-';
  document.getElementById('trips-title').textContent = 'uitjes vandaag. '+DAYS_NL[now.getDay()]+' '+now.getDate()+' '+MONTHS_NL[now.getMonth()];

  if (!today.length) {
    document.getElementById('trips-list').innerHTML = '<div class="no-trips">Geen uitjes gepland vandaag</div>';
    return;
  }

  document.getElementById('trips-list').innerHTML = today.map(t => {
    const firstName = (t.spelleider||'').trim().split(/[\s+]/)[0];
    const slug = firstName.toLowerCase().replace(/[^a-z0-9]/g,'');
    const init = initials(t.spelleider);
    const photoHtml = slug
      ? `<img src="photos/${slug}.jpg" alt="${firstName}" onerror="this.parentElement.innerHTML='${init}'">`
      : init;

    const busjeHtml = (t.busje||'').trim()
      ? `<div class="busje-block">
           <div class="busje-label">Busje</div>
           <div class="busje-num">${t.busje}</div>
           ${t.tijd ? `<div class="busje-time">${t.tijd}</div>` : ''}
         </div>`
      : `<div class="busje-block no-bus">
           ${t.tijd ? `<div class="no-bus-time">${t.tijd}</div>` : ''}
         </div>`;

    return `<div class="trip-row">
      <div class="guide-block">
        <div class="guide-photo">${photoHtml}</div>
        <div class="guide-name">${firstName}</div>
      </div>
      <div class="trip-details">
        <div class="trip-activity-name">${t.activiteit}</div>
        <div class="trip-info-line">
          ${t.plaats ? `<span class="trip-info-item"><i class="ti ti-map-pin" aria-hidden="true"></i>${t.plaats}</span>` : ''}
          ${parseInt(t.personen) ? `<span class="trip-info-item"><i class="ti ti-users" aria-hidden="true"></i>${t.personen} pers.</span>` : ''}
        </div>
      </div>
      ${busjeHtml}
    </div>`;
  }).join('');
}

function renderWeek() {
  const now = new Date();
  const mon = getMon(now);
  document.getElementById('week-rows').innerHTML = Array.from({length:5},(_,i)=>{
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    const cnt = allRows.filter(r=>sameDay(r.dateObj,d)).length;
    const td = sameDay(d,now);
    return `<div class="week-row ${td?'today':''}">
      <span class="week-row-day">${SHORT_DAYS[d.getDay()]} ${d.getDate()}</span>
      <span class="week-row-count ${cnt===0?'none':''}">${cnt||'.'}</span>
    </div>`;
  }).join('');
}

async function fetchWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=51.5&longitude=5.45&daily=weathercode,temperature_2m_max,precipitation_probability_max&timezone=Europe/Amsterdam&forecast_days=5');
    const d = await r.json();
    const icon = c => c===0?'☀️':c<=3?'⛅':c<=48?'🌫️':c<=67?'🌧️':c<=77?'❄️':c<=82?'🌦️':'⛈️';
    const now = new Date();
    document.getElementById('weather-grid').innerHTML = d.daily.time.map((dt,i)=>{
      const day=new Date(dt);
      return `<div class="weather-cell ${sameDay(day,now)?'today':''}">
        <div class="wc-day">${SHORT_DAYS[day.getDay()]}</div>
        <div class="wc-icon">${icon(d.daily.weathercode[i])}</div>
        <div class="wc-temp">${Math.round(d.daily.temperature_2m_max[i])}°</div>
        <div class="wc-rain">${d.daily.precipitation_probability_max[i]}%</div>
      </div>`;
    }).join('');
  } catch(e) {}
}

async function refresh() {
  try {
    const uitjes = await fetchData();
    allRows = parseRows(uitjes);
    renderTrips();
    renderWeek();
    document.getElementById('status-dot').className = 'live-dot';
    document.getElementById('status-txt').textContent = 'Live via Google Sheets';
    document.getElementById('f-refresh').textContent = 'Vernieuwd: '+new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('status-dot').className = 'live-dot err-dot';
    document.getElementById('status-txt').textContent = 'Verbindingsfout. opnieuw proberen...';
  }
}

updateClock();
setInterval(updateClock, 1000);
fetchWeather();
refresh();
setInterval(refresh, 60000);
setInterval(fetchWeather, 3600000);
</script>
</body>
</html>
