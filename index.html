<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uitjesbazen Kantinescherm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    #app {
      background: linear-gradient(160deg, #B52890 0%, #A62482 60%, #8a1d6b 100%);
      height: 100vh; color: white;
      display: flex; flex-direction: column;
      font-family: 'Ubuntu', sans-serif;
    }

    /* HEADER */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 36px; background: rgba(0,0,0,0.28);
      border-bottom: 3px solid #F7A940; flex-shrink: 0;
    }
    .logo-area { display: flex; align-items: center; }
    .logo-img { height: 52px; width: auto; object-fit: contain; }

    .header-center { text-align: center; }
    .header-dayname {
      font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.5); margin-bottom: 2px;
    }
    .header-fulldate { font-size: 26px; font-weight: 700; letter-spacing: 1px; }

    .header-right { text-align: right; }
    .header-time {
      font-size: 52px; font-weight: 700; color: #F7A940;
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .header-week { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 1px; margin-top: 3px; }

    /* MAIN */
    .main { flex: 1; display: grid; grid-template-columns: 1fr 320px; min-height: 0; }

    /* LEFT */
    .trips-col {
      padding: 20px 24px; display: flex; flex-direction: column;
      gap: 0; min-height: 0; overflow: hidden;
    }
    .trips-title {
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-bottom: 12px; flex-shrink: 0;
    }
    .trips-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 4px; }
    .trips-scroll::-webkit-scrollbar { width: 3px; }
    .trips-scroll::-webkit-scrollbar-track { background: transparent; }
    .trips-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    .section-divider {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.25); padding: 10px 0 6px;
      border-top: 1px solid rgba(255,255,255,0.08); margin-top: 4px;
      flex-shrink: 0;
    }

    /* TRIP CARD - fysiek */
    .trip-row {
      display: flex; align-items: stretch;
      background: rgba(255,255,255,0.09); border-radius: 10px;
      overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .guides-block {
      display: flex; flex-direction: row; align-items: center; justify-content: center;
      gap: 8px; padding: 12px 14px; min-width: 80px;
      background: rgba(0,0,0,0.15); border-right: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0; flex-wrap: wrap; max-width: 160px;
    }
    .guide-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .guide-photo {
      width: 42px; height: 42px; border-radius: 50%;
      border: 2px solid rgba(247,169,64,0.5);
      background: rgba(247,169,64,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #F7A940;
      overflow: hidden; flex-shrink: 0;
    }
    .guide-photo img { width: 100%; height: 100%; object-fit: cover; }
    .guide-name { font-size: 10px; color: rgba(255,255,255,0.6); text-align: center; line-height: 1.2; max-width: 60px; }

    .trip-details { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .trip-activity-name { font-size: 17px; font-weight: 700; color: white; line-height: 1.2; }
    .trip-info-line { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 3px; }
    .trip-info-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: rgba(255,255,255,0.55); }
    .trip-info-item i { font-size: 13px; }

    .busje-block {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 12px 16px; background: #F7A940; min-width: 88px; gap: 3px; flex-shrink: 0;
    }
    .busje-block.no-bus { background: rgba(0,0,0,0.12); }
    .busje-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(100,50,0,0.65); }
    .busje-num { font-size: 13px; font-weight: 700; color: #5a2d00; line-height: 1.3; text-align: center; max-width: 88px; word-break: break-word; }
    .busje-time { font-size: 13px; font-weight: 700; color: rgba(90,45,0,0.75); margin-top: 1px; }
    .no-bus-time { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.3); }

    /* REMOTE CARD - klein */
    .remote-row {
      display: flex; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.15); border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.07);
      padding: 8px 12px; flex-shrink: 0;
    }
    .remote-guide {
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.6);
      min-width: 60px; flex-shrink: 0;
    }
    .remote-uitjes { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .remote-item { font-size: 11px; color: rgba(255,255,255,0.45); display: flex; align-items: center; gap: 6px; }
    .remote-item-name { color: rgba(255,255,255,0.65); font-weight: 500; }
    .remote-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,0.2); flex-shrink: 0; }

    .no-trips { padding: 40px 20px; text-align: center; color: rgba(255,255,255,0.2); font-size: 14px; }

    /* SIDEBAR */
    .sidebar {
      background: rgba(0,0,0,0.22); border-left: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column; padding: 20px 22px; gap: 20px; overflow-y: auto;
    }
    .sidebar-block { display: flex; flex-direction: column; gap: 10px; }
    .sidebar-title {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.3); border-bottom: 1px solid rgba(255,255,255,0.07); padding-bottom: 6px;
    }

    .stat-item { display: flex; justify-content: space-between; align-items: baseline; padding: 2px 0; }
    .stat-label { font-size: 14px; color: rgba(255,255,255,0.6); }
    .stat-value { font-size: 32px; font-weight: 700; color: #F7A940; line-height: 1; }

    .week-rows { display: flex; flex-direction: column; gap: 4px; }
    .week-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; border-radius: 5px; font-size: 13px; }
    .week-row.today { background: rgba(247,169,64,0.15); border: 1px solid rgba(247,169,64,0.25); }
    .week-row-day { color: rgba(255,255,255,0.5); min-width: 48px; }
    .week-row-count { font-weight: 700; color: #F7A940; }
    .week-row-count.none { color: rgba(255,255,255,0.18); font-weight: 400; }

    .weather-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 5px; }
    .weather-cell {
      background: rgba(255,255,255,0.06); border-radius: 7px; padding: 8px 3px;
      text-align: center; display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .weather-cell.today { background: rgba(247,169,64,0.18); border: 1px solid rgba(247,169,64,0.3); }
    .wc-day { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; }
    .wc-icon { font-size: 18px; line-height: 1.2; }
    .wc-temp { font-size: 14px; font-weight: 700; }
    .wc-rain { font-size: 9px; color: rgba(255,255,255,0.35); }

    .sales-placeholder {
      background: rgba(247,169,64,0.07); border: 1px dashed rgba(247,169,64,0.2);
      border-radius: 8px; padding: 12px; text-align: center;
      font-size: 11px; color: rgba(255,255,255,0.3); line-height: 1.7;
    }

    /* FOOTER */
    .footer {
      background: rgba(0,0,0,0.3); padding: 6px 36px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: rgba(255,255,255,0.22); flex-shrink: 0;
    }
    .live-dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; display: inline-block; margin-right: 5px; }
    .err-dot { background: #f87171; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo-area">
      <img src="logo.png" class="logo-img" alt="Uitjesbazen">
    </div>
    <div class="header-center">
      <div class="header-dayname" id="h-dn"></div>
      <div class="header-fulldate" id="h-fd"></div>
    </div>
    <div class="header-right">
      <div class="header-time" id="h-t">--:--</div>
      <div class="header-week" id="h-w">WEEK -</div>
    </div>
  </div>

  <div class="main">
    <div class="trips-col">
      <div class="trips-title" id="trips-title">Uitjes vandaag</div>
      <div class="trips-scroll" id="trips-scroll">
        <div class="no-trips">Laden...</div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-block">
        <div class="sidebar-title">Vandaag</div>
        <div class="stat-item"><span class="stat-label">Uitjes</span><span class="stat-value" id="s-today">-</span></div>
        <div class="stat-item"><span class="stat-label">Personen</span><span class="stat-value" id="s-persons">-</span></div>
      </div>
      <div class="sidebar-block">
        <div class="sidebar-title">Deze week</div>
        <div class="week-rows" id="week-rows"></div>
      </div>
      <div class="sidebar-block">
        <div class="sidebar-title">Weer</div>
        <div class="weather-grid" id="weather-grid">
          <div style="grid-column:1/-1;text-align:center;color:rgba(255,255,255,0.2);font-size:11px;">laden...</div>
        </div>
      </div>
      <div class="sidebar-block">
        <div class="sidebar-title">Sales deze week</div>
        <div class="sales-placeholder">Koppeling met HubSpot<br>volgt in volgende stap</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span><span class="live-dot" id="status-dot"></span><span id="status-txt">Verbinden...</span></span>
    <span id="f-refresh">-</span>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxyk6fibHfjLU3moMj8vEsmhqPLXPnetC5N541TMV4mDkX0mihmuiSMmkkvbKJlPJdolg/exec';
const DAYS_NL = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
const MONTHS_NL = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const SHORT_DAYS = ['zo','ma','di','wo','do','vr','za'];

// Whitelist van echte klantuitjes (hoofdletterongevoelig, gedeeltelijke match)
const UITJE_WHITELIST = [
  'maffia gijzeling','maffia','highland games','wie is de rat','vr bomb',
  'moordspel','escape the city','robinson','pubquiz','foute bingoshow',
  'the hunt','hunt','verraad','crazy 88','moorddiner','quizshow deluxe',
  'holland groot','holland klein','holland quiz','mask','vr full','vr full package',
  'vr workshop','vr experience','escape the city','hosselaar','renewi game',
  'pubquiz deluxe','cluedo xxl','culture clash','foute bingo'
];

const REMOTE_KEYWORDS = ['op afstand', 'remote'];

function isEchtUitje(activiteit) {
  const a = (activiteit||'').toLowerCase();
  return UITJE_WHITELIST.some(w => a.includes(w));
}
function isRemote(activiteit) {
  const a = (activiteit||'').toLowerCase();
  return REMOTE_KEYWORDS.some(w => a.includes(w));
}

let allRows = [];

function getWeekNum(d) {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() + 3 - (dt.getDay()+6)%7);
  const w1 = new Date(dt.getFullYear(),0,4);
  return 1 + Math.round(((dt-w1)/86400000 - 3 + (w1.getDay()+6)%7)/7);
}
function getMon(d) {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() + (dt.getDay()===0 ? -6 : 1-dt.getDay()));
  return dt;
}
function sameDay(a,b) {
  return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
}
function initials(n) {
  const p=(n||'').trim().split(/\s+/);
  return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():(n||'?').substring(0,2).toUpperCase();
}
function splitGuides(spelleider) {
  return (spelleider||'').split('+').map(s=>s.trim()).filter(Boolean);
}
function firstName(s) {
  return (s||'').trim().split(/[\s(]/)[0];
}

function updateClock() {
  const now = new Date();
  document.getElementById('h-t').textContent = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  document.getElementById('h-dn').textContent = DAYS_NL[now.getDay()].toUpperCase();
  document.getElementById('h-fd').textContent = now.getDate()+' '+MONTHS_NL[now.getMonth()]+' '+now.getFullYear();
  document.getElementById('h-w').textContent = 'WEEK '+getWeekNum(now);
}

async function fetchData() {
  const r = await fetch(SCRIPT_URL);
  const d = await r.json();
  return d.uitjes || [];
}

function parseRows(uitjes) {
  return uitjes.map(u => {
    const d = new Date(u.datum);
    return { ...u, dateObj: isNaN(d) ? null : d };
  }).filter(r => r.dateObj && isEchtUitje(r.activiteit));
}

function guideHtml(spelleider) {
  const guides = splitGuides(spelleider);
  return guides.map(g => {
    const fn = firstName(g);
    const slug = fn.toLowerCase().replace(/[^a-z0-9]/g,'');
    const init = initials(g);
    return `<div class="guide-item">
      <div class="guide-photo">
        <img src="photos/${slug}.jpg" alt="${fn}" onerror="this.parentElement.innerHTML='${init}'">
      </div>
      <div class="guide-name">${fn}</div>
    </div>`;
  }).join('');
}

function renderTrips() {
  const now = new Date();
  const todayAll = allRows.filter(r => sameDay(r.dateObj, now));
  const fysiek = todayAll.filter(r => !isRemote(r.activiteit)).sort((a,b)=>(a.tijd||'').localeCompare(b.tijd||''));
  const remote = todayAll.filter(r => isRemote(r.activiteit));

  document.getElementById('s-today').textContent = todayAll.length;
  document.getElementById('s-persons').textContent = todayAll.reduce((s,r)=>s+(parseInt(r.personen)||0),0) || '-';
  document.getElementById('trips-title').textContent = 'uitjes vandaag. '+DAYS_NL[now.getDay()]+' '+now.getDate()+' '+MONTHS_NL[now.getMonth()];

  let html = '';

  if (!fysiek.length && !remote.length) {
    html = '<div class="no-trips">Geen uitjes gepland vandaag</div>';
    document.getElementById('trips-scroll').innerHTML = html;
    return;
  }

  // Fysieke uitjes
  html += fysiek.map(t => {
    const busjeHtml = (t.busje||'').trim()
      ? `<div class="busje-block">
           <div class="busje-label">Busje</div>
           <div class="busje-num">${t.busje}</div>
           ${t.tijd ? `<div class="busje-time">${t.tijd}</div>` : ''}
         </div>`
      : `<div class="busje-block no-bus">
           ${t.tijd ? `<div class="no-bus-time">${t.tijd}</div>` : ''}
         </div>`;
    return `<div class="trip-row">
      <div class="guides-block">${guideHtml(t.spelleider)}</div>
      <div class="trip-details">
        <div class="trip-activity-name">${t.activiteit}</div>
        <div class="trip-info-line">
          ${t.plaats ? `<span class="trip-info-item"><i class="ti ti-map-pin" aria-hidden="true"></i>${t.plaats}</span>` : ''}
          ${parseInt(t.personen) ? `<span class="trip-info-item"><i class="ti ti-users" aria-hidden="true"></i>${t.personen} pers.</span>` : ''}
        </div>
      </div>
      ${busjeHtml}
    </div>`;
  }).join('');

  // Remote uitjes — samenvoegen per spelleider
  if (remote.length) {
    html += `<div class="section-divider">Op afstand & remote</div>`;

    // Groepeer per spelleider
    const byGuide = {};
    remote.forEach(r => {
      const key = (r.spelleider||'onbekend').trim();
      if (!byGuide[key]) byGuide[key] = [];
      byGuide[key].push(r);
    });

    html += Object.entries(byGuide).map(([guide, trips]) => {
      const fn = firstName(guide);
      const items = trips.sort((a,b)=>(a.tijd||'').localeCompare(b.tijd||'')).map(t =>
        `<div class="remote-item">
          ${t.tijd ? `<span>${t.tijd}</span><span class="remote-dot"></span>` : ''}
          <span class="remote-item-name">${t.activiteit}</span>
          ${t.plaats ? `<span class="remote-dot"></span><span>${t.plaats}</span>` : ''}
          ${parseInt(t.personen) ? `<span class="remote-dot"></span><span>${t.personen} pers.</span>` : ''}
        </div>`
      ).join('');
      return `<div class="remote-row">
        <div class="remote-guide">${fn}</div>
        <div class="remote-uitjes">${items}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('trips-scroll').innerHTML = html;
}

function renderWeek() {
  const now = new Date();
  const mon = getMon(now);
  document.getElementById('week-rows').innerHTML = Array.from({length:5},(_,i)=>{
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    const cnt = allRows.filter(r=>sameDay(r.dateObj,d)).length;
    const td = sameDay(d,now);
    return `<div class="week-row ${td?'today':''}">
      <span class="week-row-day">${SHORT_DAYS[d.getDay()]} ${d.getDate()}</span>
      <span class="week-row-count ${cnt===0?'none':''}">${cnt||'.'}</span>
    </div>`;
  }).join('');
}

async function fetchWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=51.5&longitude=5.45&daily=weathercode,temperature_2m_max,precipitation_probability_max&timezone=Europe/Amsterdam&forecast_days=5');
    const d = await r.json();
    const icon = c => c===0?'☀️':c<=3?'⛅':c<=48?'🌫️':c<=67?'🌧️':c<=77?'❄️':c<=82?'🌦️':'⛈️';
    const now = new Date();
    document.getElementById('weather-grid').innerHTML = d.daily.time.map((dt,i)=>{
      const day=new Date(dt);
      return `<div class="weather-cell ${sameDay(day,now)?'today':''}">
        <div class="wc-day">${SHORT_DAYS[day.getDay()]}</div>
        <div class="wc-icon">${icon(d.daily.weathercode[i])}</div>
        <div class="wc-temp">${Math.round(d.daily.temperature_2m_max[i])}°</div>
        <div class="wc-rain">${d.daily.precipitation_probability_max[i]}%</div>
      </div>`;
    }).join('');
  } catch(e) {}
}

async function refresh() {
  try {
    const uitjes = await fetchData();
    allRows = parseRows(uitjes);
    renderTrips();
    renderWeek();
    document.getElementById('status-dot').className = 'live-dot';
    document.getElementById('status-txt').textContent = 'Live via Google Sheets';
    document.getElementById('f-refresh').textContent = 'Vernieuwd: '+new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('status-dot').className = 'live-dot err-dot';
    document.getElementById('status-txt').textContent = 'Verbindingsfout. opnieuw proberen...';
  }
}

updateClock();
setInterval(updateClock, 1000);
fetchWeather();
refresh();
setInterval(refresh, 60000);
setInterval(fetchWeather, 3600000);
</script>
</body>
</html>
