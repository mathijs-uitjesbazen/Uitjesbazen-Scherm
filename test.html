<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Test Voorspellingen</title>
  <style>
    body { font-family: sans-serif; background: #1a0f24; color: #fff; padding: 20px; }
    h1 { color: #eda348; }
    #log { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 14px; font-size: 12px; font-family: monospace; color: #aaa; max-height: 200px; overflow: auto; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-top: 20px; }
    .card { background: rgba(255,255,255,0.06); border-radius: 8px; padding: 12px; text-align: center; }
    .name { font-weight: bold; font-size: 13px; color: #eda348; margin-bottom: 6px; }
    .score { font-size: 22px; font-weight: bold; }
    .win { color: #4ade80; }
    .loss { color: #f87171; }
    .draw { color: #facc15; }
    .no-pred { color: rgba(255,255,255,0.3); font-size: 12px; }
    .summary { background: rgba(167,23,129,0.2); border: 1px solid #a71781; border-radius: 10px; padding: 16px; margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-num { font-size: 28px; font-weight: bold; color: #eda348; }
    .stat-lbl { font-size: 11px; color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
<h1>🇳🇱 NED vs MAR 🇲🇦 — Voorspellingen poule</h1>
<div id="log"></div>
<div class="summary" id="summary" style="display:none"></div>
<div class="grid" id="grid"></div>
 
<script>
const MATCH_ID = 64354;
const RANKING_URL = 'https://ranking.scorito.com/6/ranking/v2.0/gameranking/getpage/1135646/0/';
const PRED_URL = 'https://ftm-prediction-query.scorito.com/3/v1.0/matchprediction/7165/';
 
const log = msg => {
  const el = document.getElementById('log');
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
};
 
async function fetchPage(page) {
  const res = await fetch(RANKING_URL + page);
  const data = await res.json();
  return data.Content?.RankingItems || [];
}
 
async function fetchPred(userId) {
  try {
    const res = await fetch(PRED_URL + userId);
    if (!res.ok) { log(`⚠️ HTTP ${res.status} voor userId ${userId}`); return null; }
    const data = await res.json();
    return (data.content || []).find(p => p.matchId === MATCH_ID) || null;
  } catch(e) {
    log(`❌ Fout bij userId ${userId}: ${e.message}`);
    return null;
  }
}
 
async function main() {
  // Stap 1: test ranking API
  log('📡 Stap 1: Ranking API testen...');
  let users = [];
  try {
    const pages = await Promise.all([0,1,2].map(fetchPage));
    users = pages.flat().filter(u => u.UserName || u.Name).sort((a,b) => a.Rank - b.Rank);
    log(`✅ ${users.length} deelnemers geladen. Eerste 3: ${users.slice(0,3).map(u=>u.UserName).join(', ')}`);
  } catch(e) {
    log(`❌ Ranking API mislukt: ${e.message}`);
    return;
  }
 
  // Stap 2: test voorspelling 1 user
  const testUser = users[0];
  log(`📡 Stap 2: Voorspelling testen voor ${testUser.UserName} (${testUser.UserId})...`);
  const testPred = await fetchPred(testUser.UserId);
  if (testPred) {
    log(`✅ Voorspelling: NED ${testPred.homeScore} - ${testPred.awayScore} MAR`);
  } else {
    log(`⚠️ Geen voorspelling gevonden voor matchId ${MATCH_ID} bij ${testUser.UserName}`);
  }
 
  // Stap 3: alle voorspellingen
  log(`📡 Stap 3: Alle ${users.length} voorspellingen ophalen...`);
  const results = await Promise.all(users.map(async u => ({
    name: u.UserName || u.Name,
    rank: u.Rank,
    pred: await fetchPred(u.UserId)
  })));
 
  const withPred = results.filter(r => r.pred);
  log(`✅ Klaar! ${withPred.length}/${users.length} hebben NED vs MAR ingevuld.`);
 
  // Samenvatting
  const wins = withPred.filter(r => r.pred.homeScore > r.pred.awayScore).length;
  const draws = withPred.filter(r => r.pred.homeScore === r.pred.awayScore).length;
  const losses = withPred.filter(r => r.pred.homeScore < r.pred.awayScore).length;
  const scoreMap = {};
  withPred.forEach(r => {
    const k = `${r.pred.homeScore}-${r.pred.awayScore}`;
    scoreMap[k] = (scoreMap[k]||0) + 1;
  });
  const top = Object.entries(scoreMap).sort((a,b)=>b[1]-a[1])[0];
 
  const summary = document.getElementById('summary');
  summary.style.display = 'flex';
  summary.innerHTML = `
    <div class="stat"><div class="stat-num win">${wins}</div><div class="stat-lbl">🇳🇱 NED wint</div></div>
    <div class="stat"><div class="stat-num draw">${draws}</div><div class="stat-lbl">Gelijkspel</div></div>
    <div class="stat"><div class="stat-num loss">${losses}</div><div class="stat-lbl">🇲🇦 MAR wint</div></div>
    <div class="stat"><div class="stat-num">${withPred.length}/${users.length}</div><div class="stat-lbl">Ingevuld</div></div>
    ${top ? `<div class="stat"><div class="stat-num" style="color:#fff">${top[0]}</div><div class="stat-lbl">Meest voorspeld (${top[1]}x)</div></div>` : ''}
  `;
 
  // Kaartjes
  const grid = document.getElementById('grid');
  results.forEach(r => {
    const card = document.createElement('div');
    card.className = 'card';
    let scoreHtml = '<div class="no-pred">Niet ingevuld</div>';
    if (r.pred) {
      const h = r.pred.homeScore, a = r.pred.awayScore;
      const cls = h > a ? 'win' : h < a ? 'loss' : 'draw';
      scoreHtml = `<div class="score ${cls}">${h} – ${a}</div>`;
    }
    card.innerHTML = `<div class="name">#${r.rank} ${r.name}</div>${scoreHtml}`;
    grid.appendChild(card);
  });
}
 
main();
</script>
</body>
</html>
